    <script type="application/ld+json">

      "@context": "https://schema.org",
      "@type": "CarRental",
      "name": "Charoki Car",
      "alternateName": "Charoki Car Casablanca",
      "url": "https://charoki-car.vercel.app",

      "description": "Premium luxury car rental services in Casablanca, Morocco. Elite fleet including SUVs, Sedans, and City cars with 24/7 delivery.",
      "address": {
        "@type": "PostalAddress",
        "streetAddress": "12 Rue Gauthier",
        "addressLocality": "Casablanca",
        "postalCode": "20000",
        "addressCountry": "MA"
      },
      "geo": {
        "@type": "GeoCoordinates",
        "latitude": 33.5883,
        "longitude": -7.6114
      },
      "openingHoursSpecification": {
        "@type": "OpeningHoursSpecification",
        "dayOfWeek": [
          "Monday",
          "Tuesday",
          "Wednesday",
          "Thursday",
          "Friday",
          "Saturday"
        ],
        "opens": "09:00",
        "closes": "20:00"
      },

        "https://www.instagram.com/charokicar",
        "https://www.facebook.com/charokicar"
      ],

    }
    </script>
    
    <!-- FAQ Structured Data -->
    <script type="application/ld+json">

      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [{
        "@type": "Question",
        "name": "Does Charoki Car provide airport delivery?",

          "@type": "Answer",
          "text": "Yes, Charoki Car offers VIP delivery and pickup services at Mohamed V International Airport (CMN) in Casablanca and other locations across Morocco."
        }
      }, {
        "@type": "Question",
        "name": "What types of cars are available at Charoki Car?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Our elite fleet includes luxury SUVs, executive sedans, and high-performance sports cars from top brands."
        }
      }]
    }
